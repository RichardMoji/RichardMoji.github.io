<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COOPERATIVA CREDILATINO - Depósito Bancario</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #4e8ef7);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 35px 30px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .titulo {
      font-size: 24px;
      font-weight: 700;
      color: #0a4a82;
      text-transform: uppercase;
    }

    .logo-upload {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      border: 2px dashed #0a4a82;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .logo-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .estado-btn {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .estado-btn.azul { background-color: #0a4a82; }
    .estado-btn.verde { background-color: #2e8b57; }
    .estado-btn.amarillo { background-color: #e69100; }

    .form-group {
      margin-bottom: 18px;
    }

    .label {
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      display: block;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9fafb;
      transition: 0.25s;
    }

    input:focus {
      border-color: #0a4a82;
      background: #fff;
      outline: none;
    }

    .boton {
      margin-top: 10px;
      width: 100%;
      background: linear-gradient(135deg, #0a4a82, #083a66);
      color: white;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.55);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .progress-container {
      width: 100%;
      background: #eee;
      border-radius: 8px;
      margin-top: 15px;
      overflow: hidden;
      height: 22px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #0a4a82, #2a77d4);
      text-align: center;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      line-height: 22px;
      transition: width 0.3s;
    }

    .loading-text { color: #0a4a82; font-weight: bold; margin-top: 10px; }
    .error-text { color: #b80000; font-weight: bold; margin-top: 10px; }
    .warning-text { color: #e69100; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <button class="estado-btn azul" id="estadoBtn"></button>

    <div class="top-bar">
      <span class="titulo">Depósito Bancario</span>
      <label class="logo-upload" for="logoInput" id="logoPreview">📷</label>
      <input type="file" id="logoInput" accept="image/*" style="display: none;">
    </div>

    <div class="form-group">
      <label class="label">Nombre del Cliente</label>
      <input type="text" id="cliente">
    </div>

    <div class="form-group">
      <label class="label">Nombre del Banco</label>
      <input type="text" id="banco">
    </div>

    <div class="form-group">
      <label class="label">Número de Ruta</label>
      <input type="text" id="ruta">
    </div>

    <div class="form-group">
      <label class="label">Número de Cuenta</label>
      <input type="text" id="cuenta">
    </div>

    <div class="form-group">
      <label class="label">Monto a Depositar (USD)</label>
      <input type="number" id="monto" min="1">
    </div>

    <div class="form-group">
      <label class="label">Documento Aval/Fiador</label>
      <input type="file" accept="image/*,.pdf" id="imageUploadAval">
    </div>
  <div id="imagePreviewAval"></div>

    <button class="boton" id="depositarBtn">DEPOSITAR DINERO</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    const estadoBtn = document.getElementById("estadoBtn");
    const depositarBtn = document.getElementById("depositarBtn");
    const overlay = document.getElementById("overlay");
    const modalContent = document.getElementById("modalContent");
    const logoInput = document.getElementById("logoInput");
    const logoPreview = document.getElementById("logoPreview");

    let estado = "azul"; // azul, verde, amarillo

    function actualizarBotonEstado() {
      estadoBtn.className = "estado-btn " + estado;
    }

    estadoBtn.addEventListener("click", () => {
      if (estado === "azul") estado = "verde";
      else if (estado === "verde") estado = "amarillo";
      else estado = "azul";
      actualizarBotonEstado();
    });

    depositarBtn.addEventListener("click", () => {
      mostrarModal(`
        <p class="loading-text">📤 Enviando fondos...</p>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar">0%</div>
        </div>
      `);

      const progressBar = document.getElementById("progressBar");
      let porcentaje = 0;
      const intervalo = setInterval(() => {
        porcentaje += 2;
        if (porcentaje >= 87) {
          clearInterval(intervalo);
          progressBar.style.width = "87%";
          progressBar.textContent = "87%";

          let mensaje = "";
          if (estado === "azul") {
            mensaje = `<p class="warning-text">⚠️Transferencia detenida, debe adjuntar documento de aval o fiador⚠️</p>`;
          } else if (estado === "verde") {
            mensaje = `<p class="error-text">❌ Los fondos han sido retenidos por la Comisión Federal de Comercio.<br><br>El envío ha entrado en proceso de revisión. El plazo estimado es de 15 a 20 días hábiles, o bien puede habilitar el canal transaccional realizando un depósito equivalente al 0.084% del monto a transferir.</p>`;
          } else if (estado === "amarillo") {
            mensaje = `<p class="error-text">❌ Los fondos han sido retenidos por la Comisión Federal de Comercio.<br><br>Se solicitan códigos de verificación para culminar el proceso satisfactoriamente</p>`;
          }

          modalContent.innerHTML = mensaje;
        } else {
          progressBar.style.width = porcentaje + "%";
          progressBar.textContent = porcentaje + "%";
        }
      }, 120);
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) overlay.style.display = "none";
    });

    function mostrarModal(html) {
      modalContent.innerHTML = html;
      overlay.style.display = "flex";
    }

    logoInput.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          logoPreview.innerHTML = `<img src="${e.target.result}" alt="Logo">`;
        };
        reader.readAsDataURL(file);
      }
    });

    actualizarBotonEstado();
  </script>

</body>
</html>
